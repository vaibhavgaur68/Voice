<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>VoiceForge — Text to Speech Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Syne+Mono&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #07090d;
    --bg2: #0d1117;
    --card: #111827;
    --card2: #162033;
    --border: #1f2d42;
    --border2: #263650;
    --accent: #3fffa2;
    --accent2: #00c9ff;
    --accent3: #ff6b6b;
    --text: #dde6f5;
    --muted: #5a7090;
    --muted2: #8099b8;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Background grid ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(63,255,162,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(63,255,162,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Glow blobs ── */
  .glow-1, .glow-2 {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
    opacity: .18;
  }
  .glow-1 { width: 500px; height: 500px; background: #3fffa2; top: -150px; right: -100px; }
  .glow-2 { width: 400px; height: 400px; background: #00c9ff; bottom: -100px; left: -80px; }

  /* ── Layout ── */
  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 40px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    box-shadow: 0 0 20px rgba(63,255,162,.35);
  }
  .logo-text h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 22px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  .logo-text p {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .08em;
    text-transform: uppercase;
    margin-top: 3px;
  }
  .badge {
    font-size: 11px;
    font-family: 'Syne Mono', monospace;
    color: var(--accent);
    border: 1px solid rgba(63,255,162,.3);
    background: rgba(63,255,162,.07);
    padding: 5px 12px;
    border-radius: 20px;
    letter-spacing: .05em;
  }

  /* ── Grid ── */
  .grid {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 20px;
    margin-bottom: 20px;
  }

  /* ── Card ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }
  .card-label {
    font-family: 'Syne Mono', monospace;
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Text input ── */
  .text-area-wrap { position: relative; }
  textarea {
    width: 100%;
    height: 220px;
    background: var(--bg2);
    color: var(--text);
    font-family: 'Syne Mono', monospace;
    font-size: 13.5px;
    line-height: 1.7;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    resize: vertical;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  textarea:focus {
    border-color: rgba(63,255,162,.4);
    box-shadow: 0 0 0 3px rgba(63,255,162,.08);
  }
  textarea::placeholder { color: var(--muted); }
  .char-count {
    position: absolute;
    bottom: 10px;
    right: 12px;
    font-size: 11px;
    font-family: 'Syne Mono', monospace;
    color: var(--muted);
    pointer-events: none;
  }
  .char-count.warn { color: #ffb347; }
  .char-count.danger { color: var(--accent3); }

  /* ── Upload row ── */
  .upload-row {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 9px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--card2);
    color: var(--text);
    cursor: pointer;
    transition: all .18s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(63,255,162,.06); }
  .btn:active { transform: scale(.97); }
  .btn.primary {
    background: linear-gradient(135deg, var(--accent), #00d9a3);
    border: none;
    color: #07090d;
    font-weight: 700;
    flex: 1;
    justify-content: center;
    font-size: 14px;
    padding: 11px 20px;
    box-shadow: 0 0 20px rgba(63,255,162,.3);
  }
  .btn.primary:hover { box-shadow: 0 0 30px rgba(63,255,162,.5); filter: brightness(1.05); }
  .btn.secondary {
    background: linear-gradient(135deg, #1a3a5c, #0f2540);
    border-color: var(--accent2);
    color: var(--accent2);
    flex: 1;
    justify-content: center;
    font-size: 14px;
    padding: 11px 20px;
    box-shadow: 0 0 20px rgba(0,201,255,.15);
  }
  .btn.secondary:hover { box-shadow: 0 0 28px rgba(0,201,255,.35); filter: brightness(1.1); border-color: var(--accent2); color: var(--accent2); }
  .btn:disabled { opacity: .4; cursor: not-allowed; pointer-events: none; }

  #fileInput { display: none; }

  /* ── Voice selector ── */
  .voice-list {
    display: flex;
    flex-direction: column;
    gap: 7px;
    max-height: 320px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border2) transparent;
    padding-right: 4px;
  }
  .voice-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--bg2);
    cursor: pointer;
    transition: all .15s;
    user-select: none;
  }
  .voice-card:hover { border-color: var(--border2); background: var(--card2); }
  .voice-card.selected {
    border-color: var(--accent);
    background: rgba(63,255,162,.07);
    box-shadow: 0 0 12px rgba(63,255,162,.12);
  }
  .voice-avatar {
    width: 34px; height: 34px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .voice-info { flex: 1; min-width: 0; }
  .voice-name {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
  }
  .voice-meta {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .voice-tag {
    font-size: 10px;
    font-family: 'Syne Mono', monospace;
    padding: 2px 7px;
    border-radius: 4px;
    flex-shrink: 0;
  }
  .tag-m { background: rgba(0,201,255,.12); color: var(--accent2); }
  .tag-f { background: rgba(255,107,107,.1); color: #ff8fa3; }

  /* ── Speed slider ── */
  .speed-section { margin-top: 16px; }
  .speed-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .speed-label {
    font-family: 'Syne Mono', monospace;
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .speed-val {
    font-family: 'Syne Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    background: rgba(63,255,162,.08);
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid rgba(63,255,162,.2);
  }
  input[type=range] {
    width: 100%;
    height: 5px;
    -webkit-appearance: none;
    background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--val, 60%), var(--border) var(--val, 60%), var(--border) 100%);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px rgba(63,255,162,.6);
    border: 2px solid #07090d;
  }
  input[type=range]::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px rgba(63,255,162,.6);
    border: 2px solid #07090d;
  }

  /* ── Player card ── */
  .player-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
  }
  .player-inner {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  /* ── Waveform ── */
  .waveform {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 3px;
    height: 52px;
    overflow: hidden;
  }
  .bar {
    flex: 1;
    border-radius: 2px;
    background: var(--border2);
    min-height: 3px;
    transition: background .3s;
  }
  .waveform.playing .bar {
    background: linear-gradient(180deg, var(--accent), #00a07a);
    animation: wave var(--speed, .8s) ease-in-out infinite alternate;
  }
  @keyframes wave {
    from { transform: scaleY(1); }
    to   { transform: scaleY(var(--peak, 1)); }
  }

  /* ── Progress bar ── */
  .progress-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .progress-bar-track {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    width: 0%;
    transition: width .3s;
    border-radius: 2px;
  }

  /* ── Generate section ── */
  .gen-row {
    display: flex;
    gap: 12px;
    margin-top: 20px;
  }

  /* ── Status message ── */
  .status {
    font-family: 'Syne Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    padding: 10px 16px;
    background: var(--bg2);
    border-radius: 8px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 14px;
    min-height: 40px;
    transition: all .3s;
  }
  .status.loading { color: #ffb347; border-color: rgba(255,179,71,.3); background: rgba(255,179,71,.05); }
  .status.success { color: var(--accent); border-color: rgba(63,255,162,.3); background: rgba(63,255,162,.05); }
  .status.error   { color: var(--accent3); border-color: rgba(255,107,107,.3); background: rgba(255,107,107,.05); }

  /* ── Dot pulse ── */
  .dot-pulse {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #ffb347;
    animation: pulse 1s infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: .5; transform: scale(.7); }
  }

  /* ── Divider ── */
  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted2);
    letter-spacing: .06em;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── Preset tones ── */
  .tone-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .tone-btn {
    font-family: 'Syne Mono', monospace;
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted2);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .tone-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tone-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(63,255,162,.08); }

  /* ── Responsive ── */
  @media (max-width: 760px) {
    .grid { grid-template-columns: 1fr; }
    .player-inner { flex-wrap: wrap; }
    .gen-row { flex-direction: column; }
    header { flex-direction: column; align-items: flex-start; gap: 12px; }
  }

  /* ── Voice preview button ── */
  .preview-btn {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    background: var(--card2);
    color: var(--muted2);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 10px;
    flex-shrink: 0;
    transition: all .15s;
    position: relative;
  }
  .preview-btn:hover {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(0,201,255,.08);
    box-shadow: 0 0 8px rgba(0,201,255,.2);
  }
  .preview-btn.loading {
    border-color: #ffb347;
    color: #ffb347;
    pointer-events: none;
  }
  .preview-btn.playing {
    border-color: var(--accent2);
    background: rgba(0,201,255,.15);
    color: var(--accent2);
    box-shadow: 0 0 10px rgba(0,201,255,.3);
    animation: previewPulse 1s ease-in-out infinite;
  }
  @keyframes previewPulse {
    0%, 100% { box-shadow: 0 0 8px rgba(0,201,255,.25); }
    50%       { box-shadow: 0 0 16px rgba(0,201,255,.55); }
  }
  .preview-btn .btn-spin {
    width: 10px; height: 10px;
    border: 1.5px solid rgba(255,179,71,.3);
    border-top-color: #ffb347;
    border-radius: 50%;
    animation: spin .6s linear infinite;
  }

  /* ── Custom scroll ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ── Spinner ── */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(63,255,162,.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  audio { display: none; }
</style>
</head>
<body>

<div class="glow-1"></div>
<div class="glow-2"></div>

<div class="wrapper">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">🎙️</div>
      <div class="logo-text">
        <h1>VoiceForge</h1>
        <p>Text to Speech Studio</p>
      </div>
    </div>
    <span class="badge">100% FREE · No API Key</span>
  </header>

  <!-- Main Grid -->
  <div class="grid">

    <!-- Left: Text Input -->
    <div class="card">
      <div class="card-label">01 — Input Text</div>
      <div class="text-area-wrap">
        <textarea id="textInput" placeholder="Paste your text here, or upload a .txt file below...&#10;&#10;Supports any length — long documents are automatically split and merged."></textarea>
        <span class="char-count" id="charCount">0 chars</span>
      </div>
      <div class="upload-row">
        <input type="file" id="fileInput" accept=".txt,.md,.csv">
        <button class="btn" onclick="document.getElementById('fileInput').click()">
          📁 Upload File
        </button>
        <button class="btn" id="clearBtn">✕ Clear</button>
        <button class="btn" id="sampleBtn">✦ Sample</button>
      </div>
    </div>

    <!-- Right: Voice Selector -->
    <div class="card">
      <div class="card-label">02 — Voice &amp; Tone</div>

      <div class="section-title">Preset Tones</div>
      <div class="tone-row" id="toneRow">
        <button class="tone-btn active" data-tone="normal">Normal</button>
        <button class="tone-btn" data-tone="newsreader">Newsreader</button>
        <button class="tone-btn" data-tone="warm">Warm</button>
        <button class="tone-btn" data-tone="energetic">Energetic</button>
        <button class="tone-btn" data-tone="calm">Calm</button>
      </div>

      <div class="section-title">Choose Voice</div>
      <div class="voice-list" id="voiceList"></div>

      <!-- Speed -->
      <div class="speed-section">
        <div class="speed-header">
          <span class="speed-label">Playback Speed</span>
          <span class="speed-val" id="speedVal">1.0×</span>
        </div>
        <input type="range" id="speedSlider" min="0.5" max="2.0" step="0.1" value="1.0">
      </div>
    </div>

  </div><!-- /.grid -->

  <!-- Player Card -->
  <div class="player-card">
    <div class="card-label">03 — Generate &amp; Export</div>

    <div class="player-inner">
      <!-- Waveform -->
      <div class="waveform" id="waveform"></div>

      <!-- Progress -->
      <div class="progress-wrap">
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-family:'Syne Mono',monospace;font-size:11px;color:var(--muted)">
          <span id="timeElapsed">0:00</span>
          <span id="timeDuration">0:00</span>
        </div>
      </div>
    </div>

    <div class="gen-row">
      <button class="btn primary" id="generateBtn">▶ Generate &amp; Play</button>
      <button class="btn secondary" id="downloadBtn" disabled>⬇ Download WAV</button>
    </div>

    <div class="status" id="status">
      <span>✦</span>
      <span>Ready — choose a voice and type or upload your text.</span>
    </div>
  </div>

  <audio id="audioPlayer"></audio>
  <audio id="previewPlayer"></audio>

</div><!-- /.wrapper -->

<script>
// ═══════════════════════════════════════════
//  VOICES DATA
// ═══════════════════════════════════════════
const VOICES = [
  // American English
  { id: 'Matthew',  name: 'Matthew',  flag: '🇺🇸', accent: 'American',  gender: 'Male',   color: '#1a3a6a', tone: ['newsreader','normal'] },
  { id: 'Joey',     name: 'Joey',     flag: '🇺🇸', accent: 'American',  gender: 'Male',   color: '#1a3a6a', tone: ['energetic','normal'] },
  { id: 'Justin',   name: 'Justin',   flag: '🇺🇸', accent: 'American',  gender: 'Male',   color: '#1a3a6a', tone: ['warm','normal'] },
  { id: 'Joanna',   name: 'Joanna',   flag: '🇺🇸', accent: 'American',  gender: 'Female', color: '#3a1a4a', tone: ['newsreader','normal','calm'] },
  { id: 'Salli',    name: 'Salli',    flag: '🇺🇸', accent: 'American',  gender: 'Female', color: '#3a1a4a', tone: ['energetic','normal'] },
  { id: 'Kendra',   name: 'Kendra',   flag: '🇺🇸', accent: 'American',  gender: 'Female', color: '#3a1a4a', tone: ['warm','calm'] },
  { id: 'Ivy',      name: 'Ivy',      flag: '🇺🇸', accent: 'American',  gender: 'Female', color: '#3a1a4a', tone: ['normal'] },
  // British English
  { id: 'Brian',    name: 'Brian',    flag: '🇬🇧', accent: 'British',   gender: 'Male',   color: '#1a3a1a', tone: ['newsreader','calm','normal'] },
  { id: 'Amy',      name: 'Amy',      flag: '🇬🇧', accent: 'British',   gender: 'Female', color: '#2a3a1a', tone: ['warm','normal'] },
  { id: 'Emma',     name: 'Emma',     flag: '🇬🇧', accent: 'British',   gender: 'Female', color: '#2a3a1a', tone: ['calm','normal'] },
  // Australian
  { id: 'Russell',  name: 'Russell',  flag: '🇦🇺', accent: 'Australian',gender: 'Male',   color: '#3a2a1a', tone: ['normal','warm'] },
  { id: 'Nicole',   name: 'Nicole',   flag: '🇦🇺', accent: 'Australian',gender: 'Female', color: '#3a2a1a', tone: ['normal','calm'] },
  // Indian
  { id: 'Raveena',  name: 'Raveena',  flag: '🇮🇳', accent: 'Indian',    gender: 'Female', color: '#3a1a1a', tone: ['normal','warm'] },
];

const TONE_DEFAULTS = {
  normal:     'Matthew',
  newsreader: 'Brian',
  warm:       'Amy',
  energetic:  'Joey',
  calm:       'Emma',
};

const SAMPLES = [
  "Welcome to VoiceForge, your personal text to speech studio. Simply type or paste your text and choose from our selection of natural voices.",
  "The quick brown fox jumps over the lazy dog. This is a sample sentence used to test fonts and voices across multiple platforms.",
  "Artificial intelligence is transforming the way we interact with technology, creating new opportunities and challenges across every industry.",
  "In a hole in the ground there lived a hobbit. Not a nasty, dirty, wet hole, filled with the ends of worms and an oozy smell. This was a hobbit hole, and that means comfort.",
];

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let selectedVoice = 'Brian';
let currentBlob = null;
let audioObjectUrl = null;
let isPlaying = false;
let currentTone = 'normal';

// Preview state
let previewingVoice = null;   // id of voice currently previewing
let previewBtn = null;        // the DOM button element

const audioEl    = document.getElementById('audioPlayer');
const previewEl  = document.getElementById('previewPlayer');

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
function init() {
  buildWaveform();
  buildVoiceList();
  bindEvents();
  updateSlider();
}

// ═══════════════════════════════════════════
//  BUILD WAVEFORM BARS
// ═══════════════════════════════════════════
function buildWaveform() {
  const wf = document.getElementById('waveform');
  const peaks = [0.2,0.4,0.6,0.8,0.5,1.0,0.7,0.9,0.4,0.6,0.8,0.3,0.5,0.7,0.4,0.9,0.6,0.8,0.5,0.3,0.7,1.0,0.6,0.4,0.8,0.5,0.7,0.3,0.6,0.9,0.4,0.7,0.5,0.8,0.6,0.3,0.7,0.5,0.9,0.6];
  peaks.forEach((p, i) => {
    const bar = document.createElement('div');
    bar.className = 'bar';
    const h = Math.max(4, Math.round(p * 46));
    bar.style.cssText = `height:${h}px; --peak:${p.toFixed(2)}; --speed:${(0.5 + Math.random() * 0.7).toFixed(2)}s; animation-delay:${(i * 0.025).toFixed(3)}s`;
    wf.appendChild(bar);
  });
}

// ═══════════════════════════════════════════
//  BUILD VOICE LIST
// ═══════════════════════════════════════════
function buildVoiceList(filterTone = null) {
  const list = document.getElementById('voiceList');
  list.innerHTML = '';
  const voices = filterTone ? VOICES.filter(v => v.tone.includes(filterTone)) : VOICES;
  voices.forEach(v => {
    const card = document.createElement('div');
    card.className = 'voice-card' + (v.id === selectedVoice ? ' selected' : '');
    card.dataset.id = v.id;
    card.innerHTML = `
      <div class="voice-avatar" style="background:${v.color}20;border:1px solid ${v.color}80">${v.flag}</div>
      <div class="voice-info">
        <div class="voice-name">${v.name}</div>
        <div class="voice-meta">${v.accent} · ${v.tone.slice(0,2).join(', ')}</div>
      </div>
      <span class="voice-tag ${v.gender==='Male'?'tag-m':'tag-f'}">${v.gender==='Male'?'M':'F'}</span>
      <button class="preview-btn" data-voice="${v.id}" title="Preview ${v.name}'s voice">▶</button>
    `;
    // Select voice on card click (not on preview btn)
    card.addEventListener('click', e => {
      if (e.target.closest('.preview-btn')) return;
      selectVoice(v.id);
    });
    // Preview button
    card.querySelector('.preview-btn').addEventListener('click', e => {
      e.stopPropagation();
      previewVoice(v.id, e.currentTarget);
    });
    list.appendChild(card);
  });
}

function selectVoice(id) {
  selectedVoice = id;
  document.querySelectorAll('.voice-card').forEach(c => {
    c.classList.toggle('selected', c.dataset.id === id);
  });
}

// ═══════════════════════════════════════════
//  BIND EVENTS
// ═══════════════════════════════════════════
function bindEvents() {
  // Text input
  document.getElementById('textInput').addEventListener('input', updateCharCount);

  // File upload
  document.getElementById('fileInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      document.getElementById('textInput').value = ev.target.result;
      updateCharCount();
      setStatus('success', `✓ Loaded "${file.name}" (${formatBytes(file.size)})`);
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  // Clear
  document.getElementById('clearBtn').addEventListener('click', () => {
    document.getElementById('textInput').value = '';
    updateCharCount();
    setStatus('', '✦ Ready — choose a voice and type or upload your text.');
    resetPlayer();
  });

  // Sample
  document.getElementById('sampleBtn').addEventListener('click', () => {
    const idx = Math.floor(Math.random() * SAMPLES.length);
    document.getElementById('textInput').value = SAMPLES[idx];
    updateCharCount();
    setStatus('', '✦ Sample text loaded. Hit Generate & Play!');
  });

  // Tone buttons
  document.getElementById('toneRow').addEventListener('click', e => {
    const btn = e.target.closest('.tone-btn');
    if (!btn) return;
    currentTone = btn.dataset.tone;
    document.querySelectorAll('.tone-btn').forEach(b => b.classList.toggle('active', b === btn));
    buildVoiceList(currentTone === 'normal' ? null : currentTone);
    // Auto-select default voice for this tone
    const def = TONE_DEFAULTS[currentTone];
    if (def) selectVoice(def);
  });

  // Speed slider
  document.getElementById('speedSlider').addEventListener('input', updateSlider);

  // Generate
  document.getElementById('generateBtn').addEventListener('click', generateAudio);

  // Download
  document.getElementById('downloadBtn').addEventListener('click', downloadAudio);

  // Audio events
  audioEl.addEventListener('timeupdate', updateProgress);
  audioEl.addEventListener('ended', onAudioEnd);
  audioEl.addEventListener('loadedmetadata', onMetaLoaded);
}

// ═══════════════════════════════════════════
//  CHAR COUNT
// ═══════════════════════════════════════════
function updateCharCount() {
  const len = document.getElementById('textInput').value.length;
  const el = document.getElementById('charCount');
  el.textContent = len.toLocaleString() + ' chars';
  el.className = 'char-count' + (len > 5000 ? ' danger' : len > 2000 ? ' warn' : '');
}

// ═══════════════════════════════════════════
//  SLIDER
// ═══════════════════════════════════════════
function updateSlider() {
  const sl = document.getElementById('speedSlider');
  const val = parseFloat(sl.value);
  const pct = ((val - 0.5) / 1.5 * 100).toFixed(1);
  sl.style.setProperty('--val', pct + '%');
  document.getElementById('speedVal').textContent = val.toFixed(1) + '×';
  if (audioEl.src) audioEl.playbackRate = val;
}

// ═══════════════════════════════════════════
//  GENERATE AUDIO
// ═══════════════════════════════════════════
async function generateAudio() {
  const rawText = document.getElementById('textInput').value.trim();
  if (!rawText) { setStatus('error', '✕ Please enter some text first.'); return; }

  setGenerating(true);
  setStatus('loading', null, 'Splitting text into chunks...');
  resetPlayer();

  try {
    const chunks = chunkText(rawText, 450);
    const total  = chunks.length;
    setStatus('loading', null, `Fetching ${total} audio chunk${total>1?'s':''}...`);

    const buffers = [];
    for (let i = 0; i < chunks.length; i++) {
      setStatus('loading', null, `Synthesizing chunk ${i+1} of ${total}...`);
      const buf = await fetchChunk(chunks[i], selectedVoice);
      buffers.push(buf);
    }

    setStatus('loading', null, total > 1 ? 'Merging audio...' : 'Processing...');
    const wavBlob = await mergeToWav(buffers);

    currentBlob = wavBlob;
    if (audioObjectUrl) URL.revokeObjectURL(audioObjectUrl);
    audioObjectUrl = URL.createObjectURL(wavBlob);

    audioEl.src = audioObjectUrl;
    audioEl.playbackRate = parseFloat(document.getElementById('speedSlider').value);
    audioEl.play();

    document.getElementById('waveform').classList.add('playing');
    document.getElementById('downloadBtn').disabled = false;
    isPlaying = true;
    document.getElementById('generateBtn').textContent = '⏸ Pause';

    setStatus('success', `✓ Generated ${formatBytes(wavBlob.size)} — ${total} chunk${total>1?'s':''} merged`);

  } catch (err) {
    console.error(err);
    setStatus('error', '✕ Generation failed. Try shorter text or check your connection.');
  } finally {
    setGenerating(false);
  }
}

// ═══════════════════════════════════════════
//  CHUNK TEXT
// ═══════════════════════════════════════════
function chunkText(text, maxLen) {
  // Split on sentence boundaries first
  const sentences = text.match(/[^.!?\n]+[.!?\n]?/g) || [text];
  const chunks = [];
  let current = '';

  for (const s of sentences) {
    if ((current + s).length > maxLen && current.length > 0) {
      chunks.push(current.trim());
      current = s;
    } else {
      current += s;
    }
  }
  if (current.trim()) chunks.push(current.trim());

  // Safety: if any chunk is still too long, hard-split
  const safe = [];
  for (const c of chunks) {
    if (c.length <= maxLen) { safe.push(c); continue; }
    let rem = c;
    while (rem.length > 0) {
      let cut = rem.lastIndexOf(' ', maxLen);
      if (cut < 1) cut = maxLen;
      safe.push(rem.slice(0, cut).trim());
      rem = rem.slice(cut).trim();
    }
  }
  return safe.filter(Boolean);
}

// ═══════════════════════════════════════════
//  VOICE PREVIEW
// ═══════════════════════════════════════════
const PREVIEW_TEXTS = {
  Matthew:  "Hi, I'm Matthew. I'm an American voice, clear and professional.",
  Joey:     "Hey there! I'm Joey — energetic, warm, and ready to read anything for you.",
  Justin:   "Hello! I'm Justin, a friendly American voice perfect for casual content.",
  Joanna:   "Hi, I'm Joanna. Confident, clear, and great for professional narration.",
  Salli:    "Hey! Salli here — bright, expressive, and ready to bring your words to life.",
  Kendra:   "Hello, I'm Kendra. Warm and natural, ideal for storytelling and guides.",
  Ivy:      "Hi! I'm Ivy — a young, lively voice that's fun and easy to listen to.",
  Brian:    "Hello, I'm Brian. A British voice — clear, authoritative, and trustworthy.",
  Amy:      "Hi there, I'm Amy. Friendly British accent, great for any kind of content.",
  Emma:     "Hello, I'm Emma. A calm and measured British voice, perfect for long reads.",
  Russell:  "G'day! I'm Russell, an Australian voice — laid back but clear as a bell.",
  Nicole:   "Hi! I'm Nicole, Australian accent, warm and easy on the ears.",
  Raveena:  "Namaste! I'm Raveena, an Indian English voice — clear and expressive.",
};

async function previewVoice(voiceId, btn) {
  // If this voice is already playing — stop it
  if (previewingVoice === voiceId) {
    stopPreview();
    return;
  }
  // Stop any currently playing preview
  stopPreview();

  previewingVoice = voiceId;
  previewBtn = btn;

  // Show loading state
  btn.classList.add('loading');
  btn.innerHTML = '<div class="btn-spin"></div>';

  try {
    const text = PREVIEW_TEXTS[voiceId] || `Hi, I'm ${voiceId}. This is a sample of my voice.`;
    const url = `https://api.streamelements.com/kappa/v2/speech?voice=${encodeURIComponent(voiceId)}&text=${encodeURIComponent(text)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const blob = await res.blob();
    const objUrl = URL.createObjectURL(blob);

    // Confirm this preview wasn't cancelled while fetching
    if (previewingVoice !== voiceId) { URL.revokeObjectURL(objUrl); return; }

    previewEl.src = objUrl;
    previewEl.play();

    btn.classList.remove('loading');
    btn.classList.add('playing');
    btn.innerHTML = '■';

    previewEl.onended = () => {
      URL.revokeObjectURL(objUrl);
      stopPreview();
    };
  } catch (err) {
    console.error('Preview failed:', err);
    btn.classList.remove('loading');
    btn.innerHTML = '▶';
    previewingVoice = null;
    previewBtn = null;
  }
}

function stopPreview() {
  previewEl.pause();
  previewEl.src = '';
  if (previewBtn) {
    previewBtn.classList.remove('loading', 'playing');
    previewBtn.innerHTML = '▶';
  }
  previewingVoice = null;
  previewBtn = null;
}
async function fetchChunk(text, voice) {
  const url = `https://api.streamelements.com/kappa/v2/speech?voice=${encodeURIComponent(voice)}&text=${encodeURIComponent(text)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.arrayBuffer();
}

// ═══════════════════════════════════════════
//  MERGE BUFFERS → WAV BLOB
// ═══════════════════════════════════════════
async function mergeToWav(buffers) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  try {
    const decoded = await Promise.all(buffers.map(b => ctx.decodeAudioData(b.slice(0))));
    const totalLen = decoded.reduce((s, b) => s + b.length, 0);
    const sr = decoded[0].sampleRate;
    const ch = decoded[0].numberOfChannels;

    const merged = ctx.createBuffer(ch, totalLen, sr);
    let offset = 0;
    for (const db of decoded) {
      for (let c = 0; c < ch; c++) {
        merged.getChannelData(c).set(db.getChannelData(c), offset);
      }
      offset += db.length;
    }
    return audioBufferToWavBlob(merged);
  } finally {
    ctx.close();
  }
}

// ═══════════════════════════════════════════
//  AUDIOBUFFER → WAV BLOB
// ═══════════════════════════════════════════
function audioBufferToWavBlob(buffer) {
  const numCh = buffer.numberOfChannels;
  const sr    = buffer.sampleRate;
  const len   = buffer.length;
  const bps   = 16;
  const dataSize = len * numCh * (bps / 8);
  const ab    = new ArrayBuffer(44 + dataSize);
  const v     = new DataView(ab);

  function ws(off, str) { for (let i = 0; i < str.length; i++) v.setUint8(off + i, str.charCodeAt(i)); }
  ws(0, 'RIFF'); v.setUint32(4, 36 + dataSize, true);
  ws(8, 'WAVE'); ws(12, 'fmt ');
  v.setUint32(16, 16, true);
  v.setUint16(20, 1, true);
  v.setUint16(22, numCh, true);
  v.setUint32(24, sr, true);
  v.setUint32(28, sr * numCh * (bps / 8), true);
  v.setUint16(32, numCh * (bps / 8), true);
  v.setUint16(34, bps, true);
  ws(36, 'data'); v.setUint32(40, dataSize, true);

  let off = 44;
  for (let i = 0; i < len; i++) {
    for (let c = 0; c < numCh; c++) {
      const s = Math.max(-1, Math.min(1, buffer.getChannelData(c)[i]));
      v.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      off += 2;
    }
  }
  return new Blob([ab], { type: 'audio/wav' });
}

// ═══════════════════════════════════════════
//  DOWNLOAD
// ═══════════════════════════════════════════
function downloadAudio() {
  if (!currentBlob) return;
  const a = document.createElement('a');
  a.href = audioObjectUrl;
  const vname = selectedVoice.toLowerCase();
  a.download = `voiceforge_${vname}_${Date.now()}.wav`;
  a.click();
}

// ═══════════════════════════════════════════
//  PLAYER CALLBACKS
// ═══════════════════════════════════════════
function updateProgress() {
  const t = audioEl.currentTime;
  const d = audioEl.duration || 0;
  const pct = d > 0 ? (t / d * 100).toFixed(1) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('timeElapsed').textContent = formatTime(t);
  document.getElementById('timeDuration').textContent = formatTime(d);
}

function onMetaLoaded() {
  document.getElementById('timeDuration').textContent = formatTime(audioEl.duration);
}

function onAudioEnd() {
  document.getElementById('waveform').classList.remove('playing');
  document.getElementById('generateBtn').textContent = '▶ Replay';
  isPlaying = false;
  document.getElementById('progressFill').style.width = '100%';
}

// ═══════════════════════════════════════════
//  GENERATE BUTTON TOGGLE (play/pause)
// ═══════════════════════════════════════════
document.getElementById('generateBtn').addEventListener('click', function() {
  // If audio is loaded and playing — pause
  if (audioEl.src && isPlaying) {
    audioEl.pause();
    document.getElementById('waveform').classList.remove('playing');
    this.textContent = '▶ Resume';
    isPlaying = false;
    return;
  }
  // If paused with audio loaded — resume
  if (audioEl.src && !isPlaying && audioEl.currentTime > 0 && this.textContent.includes('Resume')) {
    audioEl.play();
    document.getElementById('waveform').classList.add('playing');
    this.textContent = '⏸ Pause';
    isPlaying = true;
    return;
  }
  // Otherwise generate new
  generateAudio();
}, true);

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
function setGenerating(on) {
  const btn = document.getElementById('generateBtn');
  if (on) {
    btn.disabled = true;
    btn.textContent = 'Generating...';
  } else {
    btn.disabled = false;
  }
}

function resetPlayer() {
  audioEl.pause();
  audioEl.src = '';
  isPlaying = false;
  currentBlob = null;
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('timeElapsed').textContent = '0:00';
  document.getElementById('timeDuration').textContent = '0:00';
  document.getElementById('waveform').classList.remove('playing');
  document.getElementById('downloadBtn').disabled = true;
  document.getElementById('generateBtn').textContent = '▶ Generate & Play';
}

function setStatus(type, msg, dots) {
  const el = document.getElementById('status');
  el.className = 'status' + (type ? ' ' + type : '');
  if (type === 'loading') {
    el.innerHTML = `<div class="spinner"></div><span>${dots || msg}</span>`;
  } else {
    const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : '✦';
    el.innerHTML = `<span>${icon}</span><span>${msg}</span>`;
  }
}

function formatTime(s) {
  if (!s || isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60).toString().padStart(2, '0');
  return `${m}:${sec}`;
}

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(2) + ' MB';
}

// ═══════════════════════════════════════════
//  REMOVE duplicate generateBtn listener
//  (the first btn.addEventListener above handles generate;
//   the inline onclick toggle above covers play/pause.
//   We override with capture:true to short-circuit correctly.)
// ═══════════════════════════════════════════

// ═══════════════════════════════════════════
//  BOOT
// ═══════════════════════════════════════════
init();
updateCharCount();
</script>
